version: 1

formatters:
  standard:
    format: "%(asctime)s - %(levelname)s - %(name)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  sql_subgraph_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/sql_subgraph.log
    maxBytes: 5242880  # 5MB
    backupCount: 5
    encoding: utf-8

loggers:
  nl2sql:
    level: DEBUG
    handlers: [console, sql_subgraph_file]
    propagate: false

# 未特别配置的 logger 默认只走 console（可按需调整）
root:
  level: WARNING
  handlers: [console]


