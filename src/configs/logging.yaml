version: 1

formatters:
  standard:
    format: "%(asctime)s - %(levelname)s - %(name)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  nl2sql_file:
    class: logging.handlers.TimedRotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/nl2sql.log
    when: midnight
    backupCount: 30
    encoding: utf-8
  api_file:
    class: logging.handlers.TimedRotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/api.log
    when: midnight
    backupCount: 30
    encoding: utf-8

loggers:
  nl2sql:
    level: DEBUG
    handlers: [console, nl2sql_file]
    propagate: false
  nl2sql.api:
    level: INFO
    handlers: [console, api_file]
    propagate: false

# 未特别配置的 logger 默认只走 console（可按需调整）
root:
  level: WARNING
  handlers: [console]
