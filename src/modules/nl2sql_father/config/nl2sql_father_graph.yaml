# ==============================================================================
# NL2SQL 父图配置文件（Phase 1 + Phase 2）
# ==============================================================================

# ------------------------------------------------------------------------------
# Router 配置（Phase 1 + Phase 2 共享）
# ------------------------------------------------------------------------------
router:
  # LLM配置
  model: qwen-turbo  # 轻量级模型，适合快速分类
  api_key: ${DASHSCOPE_API_KEY}  # 从环境变量读取
  temperature: 0  # 确定性输出
  timeout: 5  # LLM调用超时（秒）

  # 行为配置
  default_on_error: complex  # LLM失败时的默认判定（保守策略）
  log_decision: true  # 是否记录判定理由

# ------------------------------------------------------------------------------
# Planner 配置（Phase 2 新增）
# ------------------------------------------------------------------------------
planner:
  # LLM 配置
  model: qwen-max  # 强模型（理解能力强）
  api_key: ${DASHSCOPE_API_KEY}
  temperature: 0  # 确定性输出
  timeout: 15  # 超时时间（秒）

  # 问题拆分配置
  max_sub_queries: 5  # 最大子查询数
  min_sub_queries: 2  # 最小子查询数

  # 循环控制
  max_rounds: 5  # 最大轮次（Phase 2 会用到）

  # 可观测性
  log_plan: true  # 是否记录规划结果

# ------------------------------------------------------------------------------
# Inject Params 配置（Phase 2 新增）
# ------------------------------------------------------------------------------
inject_params:
  # 参数注入策略
  use_llm_extraction: false  # Phase 2: 简单传递，Phase 3: LLM提取

  # 可观测性
  log_injection: true  # 是否记录注入日志

# ------------------------------------------------------------------------------
# Check Completion 配置（Phase 2 新增）
# ------------------------------------------------------------------------------
check_completion:
  # 依赖环检测
  enable_cycle_detection: true  # 是否检测依赖环

  # 可观测性
  log_status: true  # 是否记录状态统计

# ------------------------------------------------------------------------------
# SQL 执行配置（Phase 1 + Phase 2 共享，增强）
# ------------------------------------------------------------------------------
sql_execution:
  # 超时配置
  timeout_per_sql: 30  # 单条SQL超时（秒）
  max_total_timeout: 300  # 总超时（秒，Phase 2多SQL场景）

  # 并发配置（Phase 2 新增）
  max_concurrency: 3  # Phase 2: 最大并发数
  enable_parallel: true  # Phase 2: 是否启用并发执行

  # 结果限制
  max_rows_per_query: 10000  # 单条SQL最大返回行数

  # 日志配置
  log_sql: true  # 是否记录执行的SQL
  log_results: true  # 是否记录执行结果（调试用）
  max_log_rows: 3  # 日志最多显示行数

# ------------------------------------------------------------------------------
# Summarizer 配置（Phase 1 + Phase 2 共享）
# ------------------------------------------------------------------------------
summarizer:
  # LLM配置
  model: qwen-plus  # 平衡效果与成本
  api_key: ${DASHSCOPE_API_KEY}
  temperature: 0.3  # 生成多样性（略高于0）
  timeout: 10  # LLM调用超时（秒）

  # 提示词配置
  max_rows_in_prompt: 10  # 提示词中最多包含多少行数据
  use_template: false  # 是否使用模板（true不调用LLM）
  enable_chart_suggestion: false  # Phase 2: 是否生成图表建议

# ------------------------------------------------------------------------------
# 对话历史配置（Phase 1 + Phase 2 共享）
# ------------------------------------------------------------------------------
conversation_history:
  enabled: true
  history_max_turns: 3  # 注入最近 N 轮（Q/A 为一轮）
  max_history_content_length: 200  # 仅约束 history 文本（每条 question/answer 最大字符数）
  read_timeout_seconds: 10  # 读取超时（秒），超时/异常 fail-open 返回空 history

# ------------------------------------------------------------------------------
# 可观测性配置（Phase 1 + Phase 2 共享）
# ------------------------------------------------------------------------------
observability:
  enable_tracing: true  # 是否启用 tracing
  log_state_transitions: true  # 是否记录 State 变更
  # [已弃用] save_checkpoints 不再生效，checkpoint 统一由 config.yaml 的
  # langgraph_persistence.checkpoint.enabled 控制
  save_checkpoints: false  # 已弃用，保留仅为向后兼容
