# MetaWeave 日志配置

version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  detailed:
    format: '%(asctime)s - %(name)s - [%(filename)s:%(lineno)d] - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/metadata.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

loggers:
  metaweave:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  metaweave.connector:
    level: INFO
  
  metaweave.extractor:
    level: INFO
  
  metaweave.llm:
    level: INFO
  
  metaweave.comment_generator:
    level: INFO

root:
  level: INFO
  handlers: [console, file]

