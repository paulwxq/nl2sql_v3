# MetaWeave 日志配置

version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  detailed:
    format: '%(asctime)s - %(name)s - [%(filename)s:%(lineno)d] - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout

  metadata_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/metadata.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

  relationships_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/relationships.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

  cql_generator_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/cql_generator.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

  loader_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/loader.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

loggers:
  metaweave.metadata:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true

  metaweave.relationships:
    level: DEBUG
    handlers: [relationships_file]
    propagate: true

  metaweave.cql_generator:
    level: DEBUG
    handlers: [cql_generator_file]
    propagate: true

  metaweave.loader:
    level: DEBUG
    handlers: [loader_file]
    propagate: true

root:
  level: INFO
  handlers: [console]

