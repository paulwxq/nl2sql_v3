# MetaWeave 日志配置

version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  detailed:
    format: '%(asctime)s - %(name)s - [%(filename)s:%(lineno)d] - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout

  metadata_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/metadata.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

  relationships_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/relationships.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

  cql_generator_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/cql_generator.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

  loader_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/loader.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

loggers:
  # ============================================================
  # Step 1 & 2: 元数据生成 (--step ddl / --step json)
  # 日志文件: metadata.log
  # ============================================================
  metaweave.generator:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.logical_key_detector:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.connector:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.extractor:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.formatter:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.ddl_loader:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.comment_generator:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.llm:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.cache:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.data_utils:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.file_utils:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true
  
  metaweave.cli:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true

  metaweave.domain_generator:
    level: DEBUG
    handlers: [metadata_file]
    propagate: true

  # ============================================================
  # Step 3: 关系发现 (--step rel)
  # 日志文件: relationships.log
  # ============================================================
  metaweave.relationships:
    level: DEBUG
    handlers: [relationships_file]
    propagate: true

  # ============================================================
  # Step 4: CQL 生成 (--step cql)
  # 日志文件: cql_generator.log
  # ============================================================
  metaweave.cql_generator:
    level: DEBUG
    handlers: [cql_generator_file]
    propagate: true

  # ============================================================
  # Step 7: 数据加载 (load --type cql)
  # 日志文件: loader.log
  # ============================================================
  metaweave.loader:
    level: DEBUG
    handlers: [loader_file]
    propagate: true
  
  # loader 模块使用 __name__，需要完整路径
  src.metaweave.core.loaders:
    level: DEBUG
    handlers: [loader_file]
    propagate: true

root:
  level: INFO
  handlers: [console]

