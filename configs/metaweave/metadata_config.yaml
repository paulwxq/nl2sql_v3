# MetaWeave 元数据生成配置文件

# 数据库连接配置
database:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:5432}
  database: ${DB_NAME:your_database}
  user: ${DB_USER:postgres}
  password: ${DB_PASSWORD:your_password}
  
  # 连接池配置
  pool_min_size: 1
  pool_max_size: 5
  
  # 要处理的 schema 列表
  schemas:
    - public
  
  # 排除的表（支持通配符 *）
  exclude_tables:
    - temp_*
    - test_*
    - _*

# 数据采样配置
sampling:
  enabled: true
  sample_size: 1000
  sample_method: limit  # limit | tablesample | range
  
  # 列统计配置
  column_statistics:
    enabled: true
    value_distribution_threshold: 10  # 唯一值<=10时才统计值分布
  
  # 枚举识别配置
  enum_detection:
    enabled: true
    # 简单两值枚举的配置
    simple_two_value:
      max_null_rate: 0.3  # 最大空值比例
      min_occurrence_per_value: 2  # 每个值最少出现次数
      max_string_length: 20  # 字符串最大长度
  
  # 标识符识别配置
  identifier_detection:
    # 数据类型白名单：只有这些类型才可能被识别为 identifier
    # 使用白名单而非黑名单，确保安全性和可预测性
    allowed_data_types:
      # 整数类型
      - integer
      - int
      - int4
      - bigint
      - int8
      - smallint
      - int2
      - serial
      - bigserial
      - smallserial
      # 字符串类型
      - varchar
      - character varying
      - char
      - character
      - bpchar        # blank-padded char (PostgreSQL内部类型名)
      # UUID类型
      - uuid
      # 数值类型（需要额外检查 scale=0，无小数位才允许）
      - numeric
      - decimal
    
    # 统计阈值
    high_uniqueness_threshold: 0.95  # 规则2：高唯一性阈值
    min_non_null_rate: 0.80  # 规则2：最小非空率
    low_uniqueness_threshold: 0.05  # 规则3：排除枚举的最低唯一性
    # 排除关键词：包含这些关键词的字段名不识别为 identifier（子串匹配）
    exclude_keywords:
      - name        # 名称字段（如 company_name, username, name）
      - nm          # 名称缩写（如 dept_nm）
      - desc        # 描述字段（如 product_desc, description）
      - description # 完整描述（如 item_description）
      - remark      # 备注字段（如 order_remark）
      - comment     # 评论/注释字段（如 user_comment）
      - details     # 详情字段（如 product_details）
      - memo        # 备忘字段（如 transaction_memo）
      - summary     # 摘要字段（如 report_summary）
  
  # Description 检测配置（长文本说明字段）
  description_detection:
    enabled: true
    
    # 类型阈值
    min_varchar_length: 256       # varchar 最小长度（小于此值不考虑）
    
    # 长度统计阈值
    min_avg_length: 50            # 平均长度阈值（核心指标）
    max_stable_std: 5             # 稳定编码的最大标准差（用于排除固定格式编码）
    min_variance_std: 20          # 离散文本的最小标准差（高离散度强判定）
    
    # 其他阈值
    min_uniqueness: 0.7           # 最小唯一性
    
    # 命名模式（包含这些关键词倾向于识别为 description）
    include_keywords:
      - description
      - desc
      - note
      - notes
      - remark
      - remarks
      - comment
      - comments
      - memo
      - explain
      - explanation
      - detail
      - details
      - content
      - text
      - message
      - action
    
    # 排除关键词（包含这些关键词排除 description，倾向于 identifier）
    exclude_keywords:
      - code
      - _id
      - _key
      - _no
      - number
      - uuid
      - token

# LLM 配置
llm:
  # 提供商：qwen-plus | deepseek
  provider: qwen-plus
  
  # 模型名称
  # qwen 系列：qwen-turbo（快速）, qwen-plus（平衡）, qwen-max（最强）, qwen-long（长文本）
  # deepseek 系列：deepseek-chat
  model: ${DASHSCOPE_MODEL:qwen-plus}
  
  # API 密钥（建议使用环境变量）
  # qwen-plus 使用 DASHSCOPE_API_KEY
  # deepseek 使用 DEEPSEEK_API_KEY
  api_key: ${DASHSCOPE_API_KEY}
  
  # API 基础 URL（deepseek 需要）
  api_base: ${DEEPSEEK_API_BASE:https://api.deepseek.com/v1}
  
  # 模型参数
  temperature: 0.3
  max_tokens: 500
  timeout: 30
  
  # 批量处理配置
  batch_size: 10
  retry_times: 3

# 注释生成配置
comment_generation:
  enabled: true
  generate_table_comment: true
  generate_column_comment: true
  language: zh-CN  # 生成中文注释
  
  # 缓存配置
  cache_enabled: true
  cache_file: cache/metaweave/comment_cache.json

# 逻辑主键识别配置
logical_key_detection:
  enabled: true
  min_confidence: 0.8
  max_combinations: 3  # 最多考虑 3 字段组合
  
  # 主键字段名模式
  name_patterns:
    - id
    - code
    - key
    - no
    - number
    - pk

# 输出配置
output:
  output_dir: output/metaweave/metadata

  # Step 2: 表/列画像输出配置
  json_directory: output/metaweave/metadata/json  # Step 2 输出 / Step 3&4 输入

  # Step 3: 关系发现输出配置
  rel_directory: output/metaweave/metadata/rel    # Step 3 输出 / Step 4 输入
  rel_granularity: global  # global | schema (Phase 1只支持global)
  rel_id_salt: ""          # 关系ID哈希盐值（可选）

  # Step 4: CQL 生成输出配置
  cql_directory: output/metaweave/metadata/cql    # Step 4 输出 / Step 5 输入

  # 输出格式
  formats:
    - ddl
    - markdown
    - json
  
  # DDL 选项
  ddl_options:
    include_comments: true
    include_indexes: true
    sample_records:
      enabled: true
      count: 5
      label_prefix: "Record"
      include_placeholders: true
  
  # Markdown 选项
  markdown_options:
    include_sample_data: true
    sample_rows: 5
    include_statistics: true

# 日志配置
logging:
  level: INFO  # DEBUG | INFO | WARNING | ERROR
  log_file: logs/metaweave/metadata.log
  console_output: true

# Step 3: 关系发现配置
# 单列候选配置
single_column:
  important_constraints:
    - single_field_primary_key
    - single_field_unique_constraint
    - single_field_index
  exclude_semantic_roles:
    - audit
    - metric
    - description  # 新增：description 字段不适合作为关联键
  logical_key_min_confidence: 0.8
  min_type_compatibility: 0.8  # 最低类型兼容性阈值
  name_similarity_important_target: 0.6  # 目标列是关键字段时的名称相似度阈值
  name_similarity_normal_target: 0.9     # 目标列是普通字段时的名称相似度阈值

# 复合键候选配置
composite:
  max_columns: 3  # 最多考虑3列的复合键
  target_sources: []  # 默认不包含索引（空列表）
    # 取消下面注释以启用索引收集：
    # - composite_indexes
  min_type_compatibility: 0.8  # 类型兼容性阈值
  logical_key_min_confidence: 0.8  # 逻辑主键最低置信度
  name_similarity_important_target: 0.6  # 特权模式目标列的名称相似度阈值

# 决策配置
decision:
  accept_threshold: 0.80  # 最低接受阈值
  high_confidence_threshold: 0.90
  medium_confidence_threshold: 0.80
  suppress_single_if_composite: true  # 复合关系存在时抑制单列关系

# 评分权重（优化后：4维度评分体系）
weights:
  inclusion_rate: 0.55        # 数据包含率（核心指标，提升权重）
  name_similarity: 0.20       # 列名相似度（防止假阳性）
  type_compatibility: 0.15    # 类型兼容性（体现JOIN性能）
  jaccard_index: 0.10         # Jaccard相似度（辅助判断，降低权重）
  # 已删除的维度：
  # - uniqueness: 0.10 （逻辑错误：外键关系中应评估源列而非目标列）
  # - semantic_role_bonus: 0.05 （推断不严谨，权重过小，意义不大）

