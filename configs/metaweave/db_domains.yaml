database:
  name: 综合数据库
  description: |
    主要包括三类数据，第一类是：区域、店铺、产品、商店销售数据；
    第二类是订单表；第三类是设备维护订单。
llm_inference:
  max_domains_per_table: 3
domains:
- name: _未分类_
  description: 无法归入其他业务主题的表
- name: 销售分析
  description: 涵盖区域、店铺、产品维度的销售流水数据，支持日/月级别的销售业绩分析，包括按地区、门店和商品类型的销售汇总。
- name: 订单管理
  description: 基于订单头表和订单明细表，管理客户订单信息及商品明细，用于分析订单结构、商品销量分布和客户购买行为。
- name: 设备维护管理
  description: 围绕设备维修工单的事实记录，结合故障码字典与设备配置信息，分析设备故障原因、停机时间与维护成本。
- name: 组织架构
  description: 包含公司、部门、员工及店铺等组织单元的信息，用于支撑人员管理、区域归属和运营责任划分等管理分析。
- name: 产品与商品分类
  description: 定义商品类型及分类体系，为销售、订单和库存等业务提供统一的产品维度标准。
- name: 地理区域
  description: 提供省、市、区等地理层级的区域维表，支持按地理位置进行销售和门店分布的多维分析。
