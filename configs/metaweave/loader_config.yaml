# =====================================================================
# Step 7 数据加载器配置文件
# =====================================================================
#
# 说明：
# - 本配置文件定义了 MetaWeave 数据加载器的参数
# - 支持多种加载类型：cql（Neo4j）、md（Markdown）、dim（维表）、sql（样例SQL）
# - 当前实现：仅支持 cql 加载器（Step 7.1）
# - 未来扩展：md/dim/sql 加载器将在后续版本中实现
#
# =====================================================================

# ---------------------------------------------------------------------
# CQL 加载器配置 (Step 7.1)
# ---------------------------------------------------------------------
# 功能：将 Step 4 生成的 Neo4j Cypher 文件加载到图数据库
# 优先级：P0（优先实现）
# ---------------------------------------------------------------------

cql_loader:
  # 输入文件路径（相对于项目根目录）
  input_file: "output/metaweave/metadata/cql/import_all.cypher"

  # Neo4j 数据库配置
  neo4j:
    use_global_config: true  # 是否使用全局配置（src/configs/config.yaml）
    # 如果 use_global_config=false，则需要提供以下配置：
    # uri: "bolt://localhost:7687"
    # user: "neo4j"
    # password: "password"
    # database: "neo4j"

  # 加载选项
  options:
    # 事务模式：
    #   - "by_section": 按章节分段执行（推荐，便于错误定位）
    #   - "single": 单事务执行（适用于小规模数据）
    transaction_mode: "by_section"

    # 是否在加载后验证结果（对比节点/关系数量）
    validate_after_load: true


# ---------------------------------------------------------------------
# MD 加载器配置 (Step 7.2) - 未来实现
# ---------------------------------------------------------------------
# 功能：将 Markdown 表定义文件加载到向量数据库（PgVector/Milvus）
# 优先级：P1
# ---------------------------------------------------------------------

md_loader:
  # 输入目录路径（相对于项目根目录）
  input_dir: "output/metaweave/metadata/md"

  # 向量数据库配置
  vector_db:
    type: "pgvector"  # 向量数据库类型：pgvector / milvus
    use_global_config: true  # 是否使用全局配置（src/configs/config.yaml）

  # 加载选项
  options:
    chunk_size: 512         # 文本分块大小
    chunk_overlap: 50       # 分块重叠大小
    embedding_model: "text-embedding-v3"  # Embedding 模型


# ---------------------------------------------------------------------
# Dim 加载器配置 (Step 7.3) - 未来实现
# ---------------------------------------------------------------------
# 功能：将维表数据加载到向量数据库，用于维度值的语义匹配
# 优先级：P1
# ---------------------------------------------------------------------

dim_loader:
  # 维表列表配置文件路径（相对于项目根目录）
  config_file: "configs/metaweave/dim_tables.yaml"

  # 向量数据库配置
  vector_db:
    type: "pgvector"
    use_global_config: true

  # 加载选项
  options:
    batch_size: 100  # 批量加载大小


# ---------------------------------------------------------------------
# SQL 加载器配置 (Step 7.4) - 未来实现
# ---------------------------------------------------------------------
# 功能：将样例 SQL 文件加载到向量数据库，用于历史 SQL 的模板匹配
# 优先级：P1
# ---------------------------------------------------------------------

sql_loader:
  # 输入目录路径（相对于项目根目录）
  input_dir: "output/metaweave/metadata/sql"

  # 向量数据库配置
  vector_db:
    type: "pgvector"
    use_global_config: true

  # 加载选项
  options:
    embedding_model: "text-embedding-v3"
