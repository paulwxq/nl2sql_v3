[pytest]
# Pytest 配置文件

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = src/tests

# 输出选项
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    requires_db: 需要数据库连接的测试
    requires_llm: 需要 LLM API 的测试

# 日志
log_cli = false
log_cli_level = INFO
log_file_level = DEBUG

# 覆盖率选项（如果使用 pytest-cov）
# addopts = --cov=src --cov-report=html --cov-report=term
