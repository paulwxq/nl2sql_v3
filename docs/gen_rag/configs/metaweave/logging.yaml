version: 1
disable_existing_loggers: false

# 日志格式定义
formatters:
  standard:
    format: "%(asctime)s - %(levelname)s - %(name)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  detailed:
    format: "%(asctime)s - %(levelname)s - %(name)s - [%(filename)s:%(lineno)d] - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

# 日志处理器定义
handlers:
  # 控制台输出（INFO 级别）
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  # Step 2: 元数据生成日志
  metadata_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/metadata.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf-8

  # Step 3: 关系发现日志
  relationships_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/relationships.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf-8

  # Step 4: CQL 生成日志
  cql_generator_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/cql_generator.log
    maxBytes: 5242880   # 5MB
    backupCount: 3
    encoding: utf-8

  # Step 7.1: 数据加载日志
  loader_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave/loader.log
    maxBytes: 5242880   # 5MB
    backupCount: 3
    encoding: utf-8

# Logger 配置
loggers:
  # Step 2: 元数据生成模块
  metaweave.metadata:
    level: DEBUG
    handlers: [console, metadata_file]
    propagate: false

  # Step 3: 关系发现模块
  metaweave.relationships:
    level: DEBUG
    handlers: [console, relationships_file]
    propagate: false

  # Step 4: CQL 生成模块
  metaweave.cql_generator:
    level: DEBUG
    handlers: [console, cql_generator_file]
    propagate: false

  # Step 7.1: 数据加载模块
  metaweave.loader:
    level: DEBUG
    handlers: [console, loader_file]
    propagate: false

# 根 logger（未匹配的 logger）
root:
  level: WARNING
  handlers: [console]
